name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows-app:
    name: Build Windows portable app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify desktop command
        run: teslacam-telemetry-ui --help

      - name: Build portable Windows app
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./scripts/build_windows.ps1 -ArtifactName "TeslaCamTelemetry-$env:RELEASE_TAG-windows-portable.zip"

      - name: Upload Windows app ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-release-zip
          path: dist/TeslaCamTelemetry-*-windows-portable.zip
          if-no-files-found: error

  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify console command
        run: teslacam-telemetry --help

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Download Windows app ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-release-zip
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            release-assets/*.zip
